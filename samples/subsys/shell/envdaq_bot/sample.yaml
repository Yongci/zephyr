sample:
  name: EnvDAQ Bot
  description: LED blink and relay cycle test application for EnvDAQ Bot
common:
  platform_allow:
    - envdaq_bot
  integration_platforms:
    - envdaq_bot
  harness: console
  build_only: true
  tags:
    - envdaq
    - gpio
tests:
  sample.subsys.shell.envdaq:
    filter: dt_alias_exists("led0") and dt_alias_exists("relay")